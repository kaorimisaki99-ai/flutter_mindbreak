name: mindbreak
description: MindBreak - No mercy. No excuses.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  fl_chart: ^0.68.0        # for charts
  intl: ^0.19.0             # for date formatting
  provider: ^6.1.2    

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.15.4

  # State
  provider: ^6.1.1

  # Storage
  shared_preferences: ^2.2.2

  # Device info
  device_info_plus: ^9.1.2

  # Fonts
  google_fonts: ^6.1.0

  # Utils
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png" 


flutter:
  uses-material-design: true

